<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capsule FPS — map.glb + collision.glb</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; bottom: 12px; color: #ddd; font-size: 13px;
      text-shadow: 0 1px 2px #000; pointer-events: none; line-height: 1.5;
    }
    #blocker {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.55); color: #fff; cursor: pointer; z-index: 10;
    }
    #blocker.hidden { display: none; }
  </style>
</head>
<body>
  <div id="blocker"><div>Clic pour jouer — WASD, souris, Espace saut, Maj sprint</div></div>
  <div id="hud"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
      "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.3/build/index.module.js"
    }
  }
  </script>
  <script type="module" src="./capsule-fps-system.js"></script>
</body>
</html>
